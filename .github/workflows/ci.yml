name: CI

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  xmake:
    name: xmake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure (release)
        run: xmake f -m release

      - name: Build
        run: xmake

      - name: Test
        run: xmake run test_fraction

  cmake:
    name: CMake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DFRACTION_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  coverage:
    name: Coverage (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcovr
        run: pip install gcovr

      - name: Configure with coverage
        run: cmake -B build -DFRACTION_ENABLE_COVERAGE=ON -DFRACTION_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Generate coverage report
        run: cmake --build build --target coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/
