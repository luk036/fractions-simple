name: Release

on:
  release:
    types: [created]

jobs:
  docs-and-benchmarks:
    name: Docs & Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and build (release)
        run: |
          xmake f -y -m release
          xmake

      - name: Run tests
        run: xmake run test_fraction

      - name: Run benchmarks
        run: xmake run benchmark_fraction | tee benchmark_results.txt

      - name: Generate Doxygen documentation
        run: xmake doxygen

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/doxygen/html

      - name: Upload benchmark results to release
        uses: softprops/action-gh-release@v2
        with:
          files: benchmark_results.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: docs-and-benchmarks
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
